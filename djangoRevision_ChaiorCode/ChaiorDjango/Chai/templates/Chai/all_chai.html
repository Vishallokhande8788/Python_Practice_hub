<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Chai</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    <h1 class="text-2xl font-bold m-4">All type of Chai avilable in this shop</h1>

    <div class="grid grid-cols-3 gap-4 m-4">

    {% for chai in chais %}

        <div class="chai-item border p-4 rounded shadow">
            <img src="{{ chai.image.url }}" alt="">
            <h2 class="text-xl font-semibold">{{ chai.name }}</h2>
            <p>{{ chai.type }}</p>
            <p>{{ chai.date_added }}</p>
        </div>

    {% endfor %}

    </div>

</body>
</html>
